# server:
#   port: 9090

spring:
  application:
    name: SpringBootWEB

    #H2 Console COnfiguration
  h2:
    console:
      enabled: true
      path: /h2-console

  #DataBase Connection Configuration
  datasource:
#    url: jdbc:h2:mem:testdb
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1 # <-- 1. Keeps the DB alive in RAM when empty
    driver-class-name: org.h2.Driver
    username: sahil
    password: password
    generate-unique-name: false               # <-- 2. Forces Spring to use 'testdb' instead of a random string

  #Show SQL queries in the console
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
      root: info                     # Standard logs for the whole app
      org.springframework.web: debug # Shows detailed info about incoming web requests

management:
  endpoints:
      web:
      exposure:
          include: "health,info,metrics" # Exposes http://localhost:8080/actuator/health
