#server:
#  port: 9090

spring:
  application:
    name: SpringBootWEB

  # H2 Console Web Configuration
  h2:
    console:
      enabled: true
      path: /h2-console

  # In-Memory Database Engine Configuration
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sahil
    password: password
    generate-unique-name: false

  # Hibernate & JPA Mapping Configurations
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

logging:
  level:
    root: info
    org.springframework.web: debug

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"